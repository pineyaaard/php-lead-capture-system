<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --card-bg: #1e293b;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            background: var(--card-bg);
            padding: 50px;
            border-radius: 16px;
        }
        h1 { font-size: 2.5rem; margin-bottom: 20px; font-weight: 800; }
        p { color: var(--text-muted); font-size: 1.1rem; margin-bottom: 15px; }
        .divider { height: 1px; background: #334155; margin: 40px 0; }
        
        a.button {
            display: inline-block;
            background-color: var(--accent);
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: 600;
            margin-top: 20px;
            transition: opacity 0.2s;
        }
        a.button:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <div class="container">
        <h1>You're in. The guide is on its way.</h1>
        <p>Check your inbox for the email with your free workflow guide.</p>
        <p style="font-size: 0.9rem; margin-top: 30px;">If you don't see it in a few minutes, check spam, promotions, or search your inbox.</p>
        
        <div class="divider"></div>
        
        <h3 style="margin-bottom: 10px;">While you wait</h3>
        <p>Visit the Main Hub for more practical AI workflows and clear next steps.</p>
        <a href="https://t.me/aiwithoutnoise1980" class="button">Go to the Main Hub</a>
    </div>

</body>
</html>
